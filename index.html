<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Speed Delivery — Coming Soon</title>
  <meta name="description" content="Super Speed Delivery — our new website is under construction. Coming soon." />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;1,800;1,900&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ink: #17181a;
      --ink-soft: #55585e;
      --bg: #f6f5f2;
      --line: rgba(23, 24, 26, 0.08);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Montserrat', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ---- animated speed streaks in the background ---- */
    .streaks {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .streak {
      position: absolute;
      height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, rgba(23, 24, 26, 0.16), transparent);
      animation: dash linear infinite;
    }

    .streak:nth-child(1) { top: 14%; width: 240px; animation-duration: 5.5s; animation-delay: 0s; }
    .streak:nth-child(2) { top: 26%; width: 140px; animation-duration: 7s;   animation-delay: 1.2s; }
    .streak:nth-child(3) { top: 42%; width: 320px; animation-duration: 4.5s; animation-delay: 0.6s; }
    .streak:nth-child(4) { top: 58%; width: 180px; animation-duration: 6.5s; animation-delay: 2s; }
    .streak:nth-child(5) { top: 72%; width: 260px; animation-duration: 5s;   animation-delay: 0.3s; }
    .streak:nth-child(6) { top: 86%; width: 150px; animation-duration: 7.5s; animation-delay: 1.6s; }

    @keyframes dash {
      from { transform: translateX(-30vw); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      to   { transform: translateX(130vw); opacity: 0; }
    }

    /* ---- faint grid texture ---- */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
    }

    /* ---- main content ---- */
    .wrap {
      position: relative;
      text-align: center;
      padding: 24px;
      max-width: 640px;
      z-index: 1;
    }

    .logo {
      width: min(320px, 62vw);
      mix-blend-mode: multiply; /* hides the white box behind the logo */
      opacity: 0;
      animation:
        enter 1s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards,
        floaty 5s ease-in-out 1.2s infinite;
      will-change: transform, opacity;
    }

    @keyframes enter {
      from { opacity: 0; transform: translateY(26px) scale(0.94); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-9px); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      padding: 9px 20px;
      border: 1px solid rgba(23, 24, 26, 0.16);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(4px);
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-soft);
      opacity: 0;
      animation: enter 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
    }

    .badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--ink);
      animation: blink 1.6s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.25; transform: scale(0.75); }
    }

    h1 {
      margin-top: 26px;
      font-size: clamp(34px, 6.5vw, 58px);
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      line-height: 1.05;
      opacity: 0;
      animation: enter 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    }

    h1 .thin {
      display: block;
      font-style: normal;
      font-weight: 400;
      font-size: 0.42em;
      letter-spacing: 0.42em;
      margin-top: 12px;
      color: var(--ink-soft);
    }

    /* animated ellipsis */
    .dots span {
      animation: dotpulse 1.4s infinite;
      display: inline-block;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotpulse {
      0%, 60%, 100% { opacity: 0.15; }
      30%           { opacity: 1; }
    }

    p.sub {
      margin-top: 22px;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.75;
      color: var(--ink-soft);
      opacity: 0;
      animation: enter 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.75s forwards;
    }

    /* ---- progress bar ---- */
    .progress {
      margin: 34px auto 0;
      width: min(360px, 80%);
      height: 4px;
      border-radius: 4px;
      background: rgba(23, 24, 26, 0.1);
      overflow: hidden;
      opacity: 0;
      animation: enter 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
    }

    .progress .bar {
      height: 100%;
      width: 40%;
      border-radius: 4px;
      background: var(--ink);
      animation: slide 2.2s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-110%); }
      100% { transform: translateX(260%); }
    }

    footer {
      position: absolute;
      bottom: 26px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(23, 24, 26, 0.42);
      opacity: 0;
      animation: enter 0.9s ease 1.1s forwards;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
      .logo, .badge, h1, p.sub, .progress, footer { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="streaks" aria-hidden="true">
    <div class="streak"></div>
    <div class="streak"></div>
    <div class="streak"></div>
    <div class="streak"></div>
    <div class="streak"></div>
    <div class="streak"></div>
  </div>
  <div class="grid" aria-hidden="true"></div>

  <main class="wrap">
    <img class="logo" src="assets/logo.png" alt="Super Speed Delivery logo" />

    <div class="badge">
      <span class="dot"></span>
      Site under construction
    </div>

    <h1>
      Coming soon<span class="dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span>
      <span class="thin">We're on our way</span>
    </h1>

    <p class="sub">
      Our brand-new website is being built at super speed.<br />
      Fast. Reliable. Delivered to your door — see you very soon.
    </p>

    <div class="progress" role="presentation">
      <div class="bar"></div>
    </div>
  </main>

  <footer>&copy; 2026 Super Speed Delivery — All rights reserved</footer>

  <script>
    // subtle parallax on the logo following the mouse
    const logo = document.querySelector('.logo');
    const fine = window.matchMedia('(pointer: fine)').matches;
    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (fine && !reduced) {
      document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 10;
        const y = (e.clientY / window.innerHeight - 0.5) * 8;
        logo.style.translate = `${x}px ${y}px`;
      });
    }
  </script>
</body>
</html>
